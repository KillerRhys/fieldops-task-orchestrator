services:
  api:
    build: .
    container_name: fto_api
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      DATABASE_URL: postgresql+psycopg://fieldops:fieldops@db:5432/fieldops
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - db
      - redis

  db:
    image: postgres:16
    container_name: fto_db
    environment:
      POSTGRES_DB: fieldops
      POSTGRES_USER: fieldops
      POSTGRES_PASSWORD: fieldops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fto_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: